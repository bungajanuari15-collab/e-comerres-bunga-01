<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Toko Bunga Pink</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff0f5;
    }

    /* Header */
    header {
      background: #f0c3d9;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Hero */
    .hero {
      background: url('https://via.placeholder.com/1200x400/ffb6c1/ffffff') no-repeat center/cover;
      color: #fff;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      background: #f5c6df;
      border: none;
      cursor: pointer;
      color: white;
      border-radius: 5px;
    }

    /* Produk */
    .produk-section {
      padding: 40px;
      text-align: center;
    }

    .produk-section h2 {
      color: #e69bc3;
    }

    .produk-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .produk {
      border: 1px solid #ffc0cb;
      padding: 15px;
      width: 220px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .produk img {
      width: 100%;
      border-radius: 10px;
    }

    .produk h3 {
      margin: 10px 0;
      color: #e690bb;
    }

    .produk p {
      color: #555;
    }

    .produk button {
      background: #eba5c8;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .produk button:hover {
      background: #f5b1d5;
    }

    /* Footer */
    footer {
      background: #fabedc;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">🌸bunaa store</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Produk</a>
      <a href="#">Kategori</a>
      <a href="#">Keranjang</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>garden florieest</h1>
    <p>make it bloom, nke it special✨</p>
    <button>Pesan Sekarang</button>
  </section>

  <!-- Produk Unggulan -->
  <section class="produk-section">
    <h2>Produk Unggulan</h2>
    <div class="produk-container">

      <div class="produk">
        <img src="bunnga">
        <h3>Buket Mawar Pink</h3>
        <p>Rp 150.000</p>
        <button>Tambah ke Keranjang</button>
      </div>

      <div class="produk">
        <img src="https://via.placeholder.com/200/ffb6c1/000000" alt="Tulip">
        <h3>Buket Tulip</h3>
        <p>Rp 200.000</p>
        <button>Tambah ke Keranjang</button>
      </div>

      <div class="produk">
        <img src="https://sevenrose.co.id/cdn/shop/products/Gold_Pastel.jpg?v=1771473422>
        <h3>lizt bouquet</h3>
        <p>Rp 180.000</p>
        <button>Tambah ke Keranjang</button>
      </div>

      <div class="produk">
        <img src="https://via.placeholder.com/200/ff1493/ffffff" alt="Mix Flower">
        <h3>Buket Campuran</h3>
        <p>Rp 220.000</p>
        <button>Tambah ke Keranjang</button>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Kontak: pinkflorist@email.com | 0812-3456-7890</p>
    <p>&copy; 2026 Pink Florist. All rights reserved.</p>
  </footer>

</body>
</html>
